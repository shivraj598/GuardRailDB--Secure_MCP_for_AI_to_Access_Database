<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GuardRailDB — Secure MCP for AI Database Access</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0f;
      color: #e4e4e7;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
      pointer-events: none;
    }
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 620px;
      padding: 0 24px;
    }
    h1 {
      font-size: clamp(36px, 7vw, 64px);
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1.05;
      margin-bottom: 16px;
      color: #e4e4e7;
    }
    h1 .db {
      color: #ffffff;
    }
    .tagline {
      font-size: 16px;
      color: #a1a1aa;
      font-weight: 400;
      line-height: 1.6;
      margin-bottom: 14px;
    }
    .tagline strong {
      color: #c4c4c7;
      font-weight: 600;
    }
    .status-line {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid rgba(249, 115, 22, 0.2);
      background: rgba(249, 115, 22, 0.05);
      font-size: 13px;
      color: #a1a1aa;
      margin-bottom: 44px;
    }
    .status-line .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #f97316;
      animation: pulse-line 1.8s ease-in-out infinite;
    }
    @keyframes pulse-line {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
    .status-line strong {
      font-weight: 600;
      color: #f97316;
    }
    .divider {
      width: 32px;
      height: 2px;
      background: #222;
      margin: 0 auto 44px;
    }
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.15s ease;
    }
    .btn-gh {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #e8e8e8;
    }
    .btn-gh:hover {
      background: #222;
      border-color: #fff;
      color: #fff;
    }
    .btn-gh svg { opacity: 0.7; }
    .btn-gh:hover svg { opacity: 1; }
    .btn-outline {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #888;
    }
    .btn-outline:hover {
      border-color: #444;
      color: #e8e8e8;
    }
    .footer {
      position: fixed;
      bottom: 28px;
      z-index: 1;
      font-size: 12px;
      color: #444;
    }
    .footer a {
      color: #555;
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer a:hover {
      color: #fff;
    }
    @media (max-width: 480px) {
      .btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>GuardRail<span class="db">DB</span></h1>

    <p class="tagline">
      A secure <strong>MCP</strong> server connecting AI agents to databases<br>
      through a policy-controlled gateway.
    </p>

    <p class="status-line"><span class="dot"></span><strong>Under production</strong> — deploying after security audit.</p>

    <div class="divider"></div>

    <div class="btn-group">
      <a href="https://github.com/shivraj598/GuardRailDB--Secure_MCP_for_AI_to_Access_Database" target="_blank" rel="noopener noreferrer" class="btn btn-gh">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">

        </svg>
        View on GitHub
      </a>
      <a href="https://github.com/shivraj598/GuardRailDB--Secure_MCP_for_AI_to_Access_Database/issues" target="_blank" rel="noopener noreferrer" class="btn btn-outline">
        Report Issue
      </a>
    </div>
  </div>

  <div class="footer">
    Developed by <a href="https://github.com/shivraj598" target="_blank" rel="noopener noreferrer">Shivraj Timilsena</a> &middot; <a href="https://github.com/shivraj598/GuardRailDB--Secure_MCP_for_AI_to_Access_Database" target="_blank" rel="noopener noreferrer">GuardRailDB</a>
  </div>
</body>
</html>
